name: Meta API Traffic Generator

on:
  schedule:
    # Runs at 00:00 UTC every 5th day of the month
    - cron: '0 0 */5 * *'
  workflow_dispatch: # This allows you to click a button to run it manually anytime!

jobs:
  run-traffic-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Automatically caches packages to speed up builds

    - name: Install official Meta Business SDK
      run: |
        python -m pip install --upgrade pip
        pip install facebook_business

    - name: Execute Traffic Generation Script
      # Securely maps your GitHub Secrets into the Python script execution window
      env:
        META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        META_APP_ID: ${{ secrets.META_APP_ID }}
        META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
        META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
      run: python meta_traffic.py
