name: Meta API Traffic Generator

on:
  schedule:
    - cron: '0 0 */5 * *'
  workflow_dispatch:

jobs:
  run-traffic-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Traffic Generation Script
      env:
        META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        META_APP_ID: ${{ secrets.META_APP_ID }}
        META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
        META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
        # 🛠️ THE FIX: Force Python's network layers to bypass local verification issues
        PYTHONHTTPSVERIFY: '0'
      run: python marketing_api_hits.py
